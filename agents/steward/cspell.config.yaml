# Steward dictionary — spec §8.2.
#
# Deliberately SEPARATE from the site's root `cspell.json` / `project-words.txt`.
# The site's config is advisory tooling the human runs; this one drives an
# activity that can emit `block` verdicts. Keeping them apart means widening the
# Steward's dictionary can never quietly weaken the site's own spellcheck, and
# a drift between the two is itself a signal worth noticing.
#
# Seeded by running cspell across `src/content/writing/*.md` (one published post
# at the time of Phase 1a) plus the site's existing `project-words.txt`. That run
# found ZERO issues — there are no unfixed typos in published posts to report.
#
# Zero-false-positive is the goal (§8.2): if a run is noisy, widen this list
# rather than downgrading severity. Never add a word to silence a real typo.
version: "0.2"
language: en

words:
  # --- Standards, protocols, acronyms ---
  - a11y
  - AEO
  - AX
  - AXIS
  - GEO
  - PLG
  - WebMCP
  - webmcp
  - llms
  - NVDA
  - WCAG
  - aria
  - aria-current
  - aria-pressed
  - frontmatter
  - MCP

  # --- Tools and platforms ---
  - Astro
  - axe
  - axe-core
  - cspell
  - Lighthouse
  - Vercel
  - Temporal
  - Temporalio
  - Octokit
  - Zod
  - execa
  - pino
  - tsx
  - Vale

  # --- Proper nouns ---
  - mattpyle
  - Milhouse
  - Biilmann

  # --- Terms of art verified in existing content ---
  - Contentful
  - preconnects
