# Vale config for the Steward (spec §8.3).
#
# StylesPath is relative to this file. `write-good` is vendored under styles/ on
# purpose — house style is versioned config, not a download.
#
# ---------------------------------------------------------------------------
# RULE TUNING — decided by Matt at the Phase 1b Checkpoint 1, 2026-07-18.
#
# The untuned baseline fired 189 alerts across 12 published files. The full
# frequency table and the excerpts the decision was made from are in
# `steward/build-log.md` (Phase 1b entry). Only rules Matt explicitly called are
# disabled here; the builder proposed no disables on its own authority.
#
# DISABLED — one rule:
#
#   Vale.Spelling
#     All 43 hits were jargon or proper nouns (Agentic, Astro, Vercel, Zod,
#     frontmatter, favicon, middleware, …) and not one was a real typo. cspell
#     already covers spelling against a curated project dictionary and reports
#     zero issues on the same files, so keeping this rule would mean maintaining
#     a second dictionary purely to duplicate a check that already passes clean.
#
# KEPT ENABLED — deliberately, including the noisy one:
#
#   write-good.E-Prime    106 hits, 8.8/file, every file. Well over the spec's
#                         "~5 per post" disable threshold, and kept anyway:
#                         Matt's call. Recorded here so a future reader does not
#                         "fix" it as an oversight.
#   write-good.Passive    17 hits
#   write-good.TooWordy   16 hits
#   write-good.So          4 hits
#   write-good.Weasel      3 hits
#
# Every Vale finding maps to `flag`, never `block` (design rule 1) — a noisy
# rule costs attention, never a blocked publish.
# ---------------------------------------------------------------------------

StylesPath = styles
MinAlertLevel = suggestion

[*.md]
BasedOnStyles = Vale, write-good

# See the DISABLED block above for the reasoning.
Vale.Spelling = NO
